[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/api/solana-rpc"
  to = "https://mainnet.helius-rpc.com"
  status = 200
  force = true

[[redirects]]
  from = "/api/solana-rpc/*"
  to = "https://mainnet.helius-rpc.com/:splat"
  status = 200
  force = true
